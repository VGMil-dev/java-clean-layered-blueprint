stages:
  - deploy

deploy:server:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh $SSH_USER@$SERVER_IP "cd $PROJECT_PATH &&
      git remote set-url origin https://oauth2:${CI_JOB_TOKEN}@gitlab.com/VGMil/repojava.git &&
      git fetch --all --tags --force &&
      git checkout $CI_COMMIT_TAG &&
      sudo docker compose down &&
      sudo docker compose up -d --build"
  rules:
    - if: $CI_COMMIT_TAG
  environment:
    name: production
    url: http://$SERVER_IP
